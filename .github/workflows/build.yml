name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          VER=$(grep -Po 'versionName = "\K[^"]+' app/build.gradle.kts)
          mkdir -p ../artifacts
          cp app/build/outputs/apk/debug/app-debug.apk "../artifacts/clipd-v${VER}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk "../artifacts/clipd-v${VER}-release-unsigned.apk"
          fi
          ls -lh ../artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-apk
          path: artifacts/*.apk
          if-no-files-found: error

  debian:
    name: Ubuntu .deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: |
          chmod +x scripts/build-deb.sh
          VER=$(grep -Po 'versionName = "\K[^"]+' android/app/build.gradle.kts)
          ./scripts/build-deb.sh "$VER"
          ls -lh artifacts

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-deb
          path: artifacts/*.deb
          if-no-files-found: error

  release:
    name: Release
    needs: [android, debian]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: clipd-apk
          path: release
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: clipd-deb
          path: release
      - name: List release files
        run: ls -lh release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
