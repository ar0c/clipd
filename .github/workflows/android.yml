name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          VER=$(grep -Po 'versionName = "\K[^"]+' app/build.gradle.kts)
          mkdir -p ../artifacts
          cp app/build/outputs/apk/debug/app-debug.apk "../artifacts/clipd-v${VER}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk "../artifacts/clipd-v${VER}-release-unsigned.apk"
          fi
          ls -lh ../artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
